name: Update ThreatFox feed

on:
  schedule:
    - cron: "*/30 * * * *"      # every 30 minutes (UTC). GitHub may delay/skip under load.
  workflow_dispatch: {}          # run manually from the Actions tab

permissions:
  contents: write

# Stop overlapping runs from racing each other to push:
concurrency:
  group: threatfox-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull IOCs from ThreatFox
        env:
          THREATFOX_AUTH_KEY: ${{ secrets.THREATFOX_AUTH_KEY }}
        run: python pull_threatfox.py

      - name: Commit threatfox.json if it changed
        run: |
          git config user.name  "threatfox-bot"
          git config user.email "actions@users.noreply.github.com"

          # Nothing changed? Then there's nothing to do.
          if git diff --quiet -- threatfox.json; then
            echo "No change in threatfox.json - nothing to commit."
            exit 0
          fi

          git add threatfox.json
          git commit -m "Update ThreatFox feed ($(date -u '+%Y-%m-%d %H:%M UTC'))"

          # Push, but if main moved while we were working, rebase onto it and retry.
          # This fixes the '! [rejected] (fetch first)' race.
          for attempt in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt) - syncing with remote and retrying..."
            git pull --rebase --autostash origin main || true
          done

          echo "push still failing after retries" >&2
          exit 1
